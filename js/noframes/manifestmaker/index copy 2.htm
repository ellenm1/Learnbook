<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>SCORM Manifest Generator</title>
    <link rel="stylesheet" href="styles.css" />
  <script src="//ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>

     
</head>
<body>
 <form name="courseform">
 <fieldset>
  <p><label for="courseid">Course ID (e.g. MLRN-10002):</label><input type="text" name="courseid" id="courseid" value=""  size="40" maxlength="60"></p>
  	<p><label for="coursetitle">Course Title  (e.g. Principles of Adult Learning)</label>&nbsp; <input type="text" name="coursetitle" id="coursetitle" value=""  size="40" maxlength="300"></p>
  	<p><label for="lessontype">Lesson type  (e.g. Learning Module, Learning Module and Quiz, Video, etc.)</label>&nbsp; <input type="text" name="lessontype" id="lessontype" value="Learning Module and Quiz"  size="40" maxlength="60"></p>
  	<p><label for="masteryscore">Mastery Score (e.g. 80)</label>&nbsp; <input type="text" name="masteryscore" id="masteryscore" value="80"  size="10" maxlength="3">%</p>
  	<p><label for="lauchurl">Launch URL (Absolute URL for most, but just "index.htm" for Saba-hosted Michart courses):</label>&nbsp; <input type="text" name="launchurl" id="launchurl" value="https://mlearningcontent2.med.umich.edu/content/ct/safety/firesafety2014/index.htm"  size="80" maxlength="200"></p> 
  </fieldset>
  </form><!--end moduletypeform-->
 
     <div id="container"></div>
     
  
    <div id="buttons" class="ab" style="width:100%">
         <input name="lastitm" type="hidden" value="0" />
         <input name="submit" type="submit" value="submit" onclick="createArray();"/>
    </div><!--buttons-->
  
    <div id="output">
    <div class="label">Manifest will show up here. Copy and paste into a new text file called "imsmanifest.xml"</div>
        <textarea name="arr" id="arr" cols="100" rows="40" ></textarea> 
        <div><input name="resetOutput" type="reset" value="reset" onclick="document.getElementById('arr').value='';" /></div>
    </div><!--output-->
 
<div id="debug">

</div>
    <script language="javascript" type="text/javascript" src="writearray.js"></script>
</body>
</html>
